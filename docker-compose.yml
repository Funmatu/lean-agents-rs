services:
  sglang:
    image: lmsysorg/sglang:latest
    command: >
      python3 -m sglang.launch_server
      --model-path Qwen/Qwen3.5-2B
      --port 30000
      --host 0.0.0.0
      --trust-remote-code
      --mem-fraction-static 0.85
    ports:
      - "30000:30000"
    volumes:
      - model-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  lean-agents:
    build: .
    ports:
      - "8080:8080"
    environment:
      SGLANG_URL: http://sglang:30000
      # SGLANG_MODEL: Qwen/Qwen3.5-27B
      SGLANG_MODEL: Qwen/Qwen3.5-2B 
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      MAX_CONCURRENT_TASKS: 4
      PORT: 8080
      RUST_LOG: info
    depends_on:
      sglang:
        condition: service_healthy

volumes:
  model-cache:
